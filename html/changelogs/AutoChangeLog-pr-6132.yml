author: "WeNeedMorePhoron"
delete-after: True
changes:
  - rscadd: "Added AOE Cleave / Sweep framework - certain two-handed weapons can now hit multiple targets in a swing"
  - rscadd: "Cleave patterns displayed in intent examine with color-coded ASCII grid (T=target, U=user, X=hit tiles, O=miss tiles)"
  - rscadd: "Diagonal cleave/sweep support with explicit L-shaped patterns and separate diagonal display in examine"
  - rscadd: "Cleave prioritizes living targets over dead, fires even when swinging at empty air"
  - rscadd: "Shields now display passive projectile block chance with an explanatory tooltip"
  - rscadd: "New Attack Delay indicator on intents with swingdelay"
  - rscadd: "Two new clickCD tiers: Massive (Extremely Sluggish) and Glacial"
  - rscadd: "Demolition mod moved to intent level. All axes cut intent unified on 2.0. All axe chop intent unified on 4x. Maul is 1.25"
  - balance: "Greatsword reworked - Removed Rend & Bash on gripped intents, gains Cleave and Sweep AOE intents"
  - balance: "Executioner's Sword gains Cleave and Sweep at 1.2 damfactor, keeps Cut and Rend. Intents re-arranged with Cut going first and Rend going last."
  - balance: "Greataxe gains frontal arc Sweep at 1.1 damfactor with Massive clickCD"
  - balance: "Maul gains frontal arc Sweep with Glacial clickCD, loses Daze"
  - balance: "Axes cut damfactor increased to 1.3 (from 1.1), loses penfactor, clickCD increased in general"
  - balance: "Greatflail / Matthios Flail gain charged horizontal Sweep at 1.5 damfactor"
  - balance: "Bardiche gains Cleave and Sweep, loses gripped Chop. AOE intents are 2 tiles reach."
  - balance: "Glaive gains Sweep, thrust moved to bad thrust subtype (penfactor 20, no effective range). AOE intents are 2 tiles reach."
  - balance: "Naginata gains Sweep, loses Peel. AOE intent is 2 tile reach."
  - balance: "Eaglebeak thrust moved to bad thrust subtype — no effective range bonus"
  - balance: "Summer Scythe gains Cleave and Sweep, loses Thrust"
  - balance: "Shield passive coverage increased across the board - Wooden 60, Kite/Tower 70, Heater/Iron Buckler 50, Hoplon 60"
  - balance: "Shield durability narrowed - Wooden raised to 120, Kite/Tower reduced to 280"
  - balance: "Shields now take extra parry damage from weapons with high Anti-Object Mod or Integrity Damage modifiers"
  - balance: "Lance's lance intent is now a 1 extra target cleave attack. Report any balance issue."
  - qol: "Attack Speed display is now color-coded across six granular tiers (including new Extremely Sluggish and Glacial)"
  - qol: "Cleave examine shows max additional targets, living priority note, and diagonal pattern info"
  - qol: "Integrity Damage display cleaned up with clickable explanation"
  - qol: "Shield now display passive coverage chance and explain mechanics"
  - image: "Intent icons split out to dedicated rogueintents.dmi. Report any missing icons."